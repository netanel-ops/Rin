<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nati Don't Shout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle {
      color: #888;
      margin-bottom: 30px;
    }
    
    .section {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid #333;
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    label {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 6px;
    }
    
    input, select {
      background: #0f0f0f;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px;
      color: #e0e0e0;
      font-size: 14px;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    button.secondary {
      background: #333;
    }
    
    button.danger {
      background: #d32f2f;
    }
    
    .table-container {
      overflow-x: auto;
      margin-top: 20px;
      max-height: 600px;
      overflow-y: auto;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    
    th {
      background: #0f0f0f;
      font-weight: 600;
      color: #aaa;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      background: #1a1a1a;
      z-index: 5;
    }
    
    th:first-child {
      z-index: 15;
      background: #0f0f0f;
    }
    
    tr:hover {
      background: #222;
    }
    
    .status-badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      display: inline-block;
    }
    
    .status-planned { background: #444; color: #aaa; }
    .status-approved { background: #2196f3; color: white; }
    .status-queued { background: #ff9800; color: white; }
    .status-executing { background: #ff9800; color: white; }
    .status-executed { background: #4caf50; color: white; }
    .status-failed { background: #f44336; color: white; }
    
    .countdown {
      color: #ff9800;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    
    .logs {
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    
    .log-entry {
      margin-bottom: 4px;
    }
    
    .log-error { color: #f44336; }
    .log-success { color: #4caf50; }
    .log-info { color: #2196f3; }
    .log-warning { color: #ff9800; }
    
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    
    .wallet-info {
      background: #0f0f0f;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      margin-bottom: 16px;
      border: 1px solid #444;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nati Don't Shout</h1>
    <p class="subtitle">Market Seeding Tool for Rain Protocol</p>
    
    <!-- Wallet Connection -->
    <div class="section">
      <div class="section-title">Wallet Connection</div>
      <div id="walletInfo" class="wallet-info">Not connected</div>
      <button id="connectBtn" onclick="connectWallet()">Connect MetaMask</button>
    </div>
    
    <!-- Config Section -->
    <div class="section">
      <div class="section-title">Configuration</div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Gemini API Key</label>
          <input type="password" id="geminiKey" placeholder="AIzaSy..." value="AIzaSyAehboCdzPpsRvZZDRu2CtvagcdK3HY3Cc">
        </div>
      </div>
      
      <button onclick="saveGeminiKey()">Save API Key</button>
    </div>
    
    <!-- Generation Section -->
    <div class="section">
      <div class="section-title">Generate Markets</div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Number of Markets</label>
          <input type="number" id="numMarkets" value="10" min="1">
        </div>
        
        <div class="form-group">
          <label>Total Allocation ($)</label>
          <input type="number" id="totalAllocation" value="150" min="9" step="1">
        </div>
        
        <div class="form-group">
          <label>Size Deviation (%)</label>
          <input type="number" id="sizeDeviation" value="20" min="0" max="100">
        </div>
        
        <div class="form-group">
          <label>Base Interval (minutes)</label>
          <input type="number" id="baseInterval" value="60" min="1">
        </div>
        
        <div class="form-group">
          <label>Market Length (days)</label>
          <input type="number" id="marketLength" value="14" min="1">
        </div>
      </div>
      
      <button onclick="generateMarkets()">Generate Markets 🤖</button>
    </div>
    
    <!-- Markets Table -->
    <div class="section">
      <div class="section-title">Markets (<span id="marketCount">0</span>)</div>
      
      <div class="controls">
        <button onclick="queueSelected()" class="secondary">Queue Selected</button>
        <button onclick="launchAll()">Sign & Launch All 🚀</button>
        <button onclick="deleteSelected()" class="danger">Delete Selected</button>
        <button onclick="retryFailed()" class="secondary">Retry Failed ↺</button>
      </div>
      
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
              <th>Status</th>
              <th>Title</th>
              <th>Allocation</th>
              <th>Fires In</th>
              <th>Length</th>
              <th>Options</th>
              <th>Probs</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="marketsTable">
            <tr>
              <td colspan="9" style="text-align: center; padding: 40px; color: #666;">
                No markets yet. Generate some above!
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    
    <!-- Logs Section -->
    <div class="section">
      <div class="section-title">Execution Logs</div>
      <div class="logs" id="logs">
        <div class="log-info">[Ready] Waiting for wallet connection...</div>
      </div>
    </div>
  </div>
  
  <script type="module">
    import { GoogleGenerativeAI } from 'https://esm.sh/@google/generative-ai@0.21.0';
    import { Rain } from 'https://esm.sh/@buidlrrr/rain-sdk@1.1.0';
    import { createWalletClient, createPublicClient, custom, http, parseUnits } from 'https://esm.sh/viem@2.21.54';
    import { arbitrum } from 'https://esm.sh/viem@2.21.54/chains';

    // Global state
    window.state = {
      walletClient: null,
      publicClient: null,
      rain: null,
      userAddress: null,
      genAI: null,
      model: null,
      markets: []
    };

    const USDT_ADDRESS = '0xFd086bC7CD5C481DCC9C85ebE478A1C0b69FCbb9';
    const MIN_MARKET_SIZE = 9;

    // Load from localStorage
    function loadMarkets() {
      const stored = localStorage.getItem('nati_markets');
      return stored ? JSON.parse(stored) : [];
    }

    function saveMarkets() {
      localStorage.setItem('nati_markets', JSON.stringify(window.state.markets));
    }

    // Log helper
    function log(message, type = 'info') {
      const logs = document.getElementById('logs');
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logs.appendChild(entry);
      logs.scrollTop = logs.scrollHeight;
    }

    // Connect Wallet
    window.connectWallet = async () => {
      try {
        if (!window.ethereum) {
          log('MetaMask not installed!', 'error');
          return alert('Please install MetaMask');
        }

        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        window.state.userAddress = accounts[0];

        // Switch to Arbitrum
        try {
          await window.ethereum.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId: '0xa4b1' }],
          });
        } catch (switchError) {
          if (switchError.code === 4902) {
            await window.ethereum.request({
              method: 'wallet_addEthereumChain',
              params: [{
                chainId: '0xa4b1',
                chainName: 'Arbitrum One',
                nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                rpcUrls: ['https://arb1.arbitrum.io/rpc'],
                blockExplorerUrls: ['https://arbiscan.io/']
              }]
            });
          }
        }

        window.state.walletClient = createWalletClient({
          account: window.state.userAddress,
          chain: arbitrum,
          transport: custom(window.ethereum)
        });

        window.state.publicClient = createPublicClient({
          chain: arbitrum,
          transport: http('https://arb1.arbitrum.io/rpc')
        });

        window.state.rain = new Rain({ environment: 'production' });

        document.getElementById('walletInfo').textContent = `Connected: ${window.state.userAddress}`;
        document.getElementById('connectBtn').textContent = 'Connected ✓';
        document.getElementById('connectBtn').disabled = true;
        
        log('Wallet connected: ' + window.state.userAddress, 'success');
        
        // Load markets
        window.state.markets = loadMarkets();
        renderMarketsTable();
        
      } catch (error) {
        log('Wallet connection failed: ' + error.message, 'error');
      }
    };

    // Save Gemini API key
    window.saveGeminiKey = () => {
      const apiKey = document.getElementById('geminiKey').value.trim();
      if (!apiKey) return alert('Please enter API key');
      
      try {
        window.state.genAI = new GoogleGenerativeAI(apiKey);
        window.state.model = window.state.genAI.getGenerativeModel({ 
          model: 'gemini-2.0-flash-exp',
          generationConfig: {
            maxOutputTokens: 8192,
            temperature: 0.9
          }
        });
        localStorage.setItem('gemini_key', apiKey);
        log('Gemini API key configured', 'success');
        alert('API key saved!');
      } catch (error) {
        log('Failed to configure Gemini: ' + error.message, 'error');
      }
    };

    // Calculate jitter
    function calculateJitter(baseDays) {
      const minDays = baseDays * 0.7;
      const maxDays = baseDays * 1.3;
      return minDays + Math.random() * (maxDays - minDays);
    }

    // Generate markets
    window.generateMarkets = async () => {
      if (!window.state.model) {
        return alert('Please configure Gemini API key first!');
      }
      
      const config = {
        num_markets: parseInt(document.getElementById('numMarkets').value),
        total_allocation: parseFloat(document.getElementById('totalAllocation').value),
        size_deviation_pct: parseFloat(document.getElementById('sizeDeviation').value),
        base_interval_minutes: parseInt(document.getElementById('baseInterval').value),
        market_length_days: parseInt(document.getElementById('marketLength').value)
      };
      
      // Validation
      const avgAllocation = config.total_allocation / config.num_markets;
      if (avgAllocation < MIN_MARKET_SIZE) {
        log(`Error: Minimum $${MIN_MARKET_SIZE} per market required (current avg: $${avgAllocation.toFixed(2)})`, 'error');
        return alert(`Minimum $${MIN_MARKET_SIZE} per market required!\nCurrent average: $${avgAllocation.toFixed(2)}`);
      }
      
      log(`Generating ${config.num_markets} markets with Gemini AI...`, 'info');
      
      try {
        const prompt = `Generate ${config.num_markets} prediction market ideas for Rain protocol.

Rules:
- Each market MUST have exactly 3 options: ["Yes", "No", "N/A"]
- Probabilities must sum to 100
- N/A should be ~1%
- Example probabilities: [49, 50, 1] or [45, 54, 1]
- Markets should be interesting, current, viral, and diverse
- Focus on: crypto prices, politics, sports, tech, culture, memes
- Make them engaging - people should want to trade!

Return ONLY a JSON array with this exact structure:
[
  {
    "title": "Will BTC reach $100k by end of April 2026?",
    "description": "Bitcoin price prediction for Q2 2026",
    "options": ["Yes", "No", "N/A"],
    "probabilities": [45, 54, 1]
  }
]

Generate exactly ${config.num_markets} markets. Return ONLY the JSON array, no markdown, no explanation, no extra text.`;

        const result = await window.state.model.generateContent(prompt);
        const text = result.response.text();
        
        // Extract JSON
        const firstBracket = text.indexOf('[');
        const lastBracket = text.lastIndexOf(']');
        
        if (firstBracket === -1 || lastBracket === -1) {
          throw new Error('No JSON array found in Gemini response');
        }
        
        const jsonText = text.substring(firstBracket, lastBracket + 1);
        const generatedMarkets = JSON.parse(jsonText);
        
        log(`Received ${generatedMarkets.length} markets from Gemini`, 'success');
        
        // Calculate allocations with deviation
        const allocations = [];
        let remainingAllocation = config.total_allocation;
        
        for (let i = 0; i < config.num_markets; i++) {
          let allocation = avgAllocation * (1 + (Math.random() * 2 - 1) * (config.size_deviation_pct / 100));
          allocation = Math.max(MIN_MARKET_SIZE, allocation);
          
          if (i === config.num_markets - 1) {
            allocation = Math.max(MIN_MARKET_SIZE, remainingAllocation);
          } else {
            remainingAllocation -= allocation;
          }
          
          allocations.push(allocation);
        }
        
        // Create market objects
        const now = Date.now();
        
        for (let i = 0; i < generatedMarkets.length; i++) {
          const market = generatedMarkets[i];
          const allocation = allocations[i];
          
          // Fire time with jitter (0.6-1.4)
          const jitter = 0.6 + Math.random() * 0.8;
          const intervalMinutes = Math.round(config.base_interval_minutes * i * jitter);
          const fireAt = Math.floor(now / 1000) + (intervalMinutes * 60);
          
          // Expiration with ±30% jitter
          const marketLengthDaysWithJitter = calculateJitter(config.market_length_days);
          const expirationTimestamp = fireAt + Math.floor(marketLengthDaysWithJitter * 24 * 60 * 60);
          
          window.state.markets.push({
            id: Date.now() + i,
            title: market.title,
            description: market.description || market.title,
            options: market.options,
            probabilities: market.probabilities,
            allocation: allocation,
            status: 'planned',
            intervalMinutes: intervalMinutes,
            fireAt: fireAt,
            marketLengthDays: config.market_length_days,
            expirationTimestamp: expirationTimestamp,
            createdAt: now,
            txHash: null,
            errorMessage: null
          });
        }
        
        saveMarkets();
        renderMarketsTable();
        log(`Generated ${generatedMarkets.length} markets successfully!`, 'success');
        
      } catch (error) {
        console.error('Generation error:', error);
        log('Generation failed: ' + error.message, 'error');
        alert('Error: ' + error.message);
      }
    };

    // Render markets table
    function renderMarketsTable() {
      const tbody = document.getElementById('marketsTable');
      document.getElementById('marketCount').textContent = window.state.markets.length;
      
      if (window.state.markets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px; color: #666;">No markets yet. Generate some above!</td></tr>';
        return;
      }
      
      const now = Math.floor(Date.now() / 1000);
      
      tbody.innerHTML = window.state.markets.map(m => {
        const fireIn = Math.max(0, m.fireAt - now);
        const hours = Math.floor(fireIn / 3600);
        const minutes = Math.floor((fireIn % 3600) / 60);
        const seconds = fireIn % 60;
        const timeStr = hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m ${seconds}s`;
        
        const canSelect = m.status === 'planned' || m.status === 'failed';
        
        return `
          <tr>
            <td><input type="checkbox" class="market-checkbox" data-id="${m.id}" ${!canSelect ? 'disabled' : ''}></td>
            <td><span class="status-badge status-${m.status}">${m.status}</span></td>
            <td style="max-width: 300px;">${m.title}</td>
            <td>$${m.allocation.toFixed(2)}</td>
            <td class="countdown">${timeStr}</td>
            <td>${m.marketLengthDays}d</td>
            <td style="font-size: 11px;">${m.options.join(', ')}</td>
            <td style="font-size: 11px;">${m.probabilities.join(', ')}</td>
            <td>
              ${m.status === 'failed' ? `<button class="secondary" style="padding: 6px 12px;" onclick="retryMarket(${m.id})">↺</button>` : ''}
            </td>
          </tr>
        `;
      }).join('');
      
      // Update every second
      setTimeout(renderMarketsTable, 1000);
    }

    // Toggle select all
    window.toggleSelectAll = () => {
      const checked = document.getElementById('selectAll').checked;
      document.querySelectorAll('.market-checkbox:not(:disabled)').forEach(cb => {
        cb.checked = checked;
      });
    };

    // Get selected IDs
    function getSelectedIds() {
      return Array.from(document.querySelectorAll('.market-checkbox:checked'))
        .map(cb => parseInt(cb.dataset.id));
    }

    // Queue selected
    window.queueSelected = () => {
      const ids = getSelectedIds();
      if (ids.length === 0) return alert('No markets selected');
      
      window.state.markets.forEach(m => {
        if (ids.includes(m.id)) {
          m.status = 'approved';
        }
      });
      
      saveMarkets();
      renderMarketsTable();
      log(`Queued ${ids.length} markets`, 'success');
    };

    // Launch all approved
    window.launchAll = async () => {
      if (!window.state.walletClient) {
        return alert('Please connect wallet first!');
      }
      
      const approved = window.state.markets.filter(m => m.status === 'approved');
      
      if (approved.length === 0) {
        return alert('No approved markets to launch!');
      }
      
      log(`Launching ${approved.length} markets...`, 'info');
      
      try {
        // Build all transactions
        const allTxs = [];
        
        // First: Approve USDT (once)
        log('Building approval transaction...', 'info');
        const approveTx = window.state.rain.buildApprovalTx({
          tokenAddress: USDT_ADDRESS,
          spender: USDT_ADDRESS, // Will be updated per market
          amount: 2n ** 256n - 1n
        });
        allTxs.push(approveTx);
        
        // Then: Build all market creation txs
        for (const market of approved) {
          log(`Building tx for: ${market.title}`, 'info');
          market.status = 'executing';
          
          const inputAmountWei = parseUnits(market.allocation.toString(), 6);
          
          // Fix private market disputeTimer
          const originalDisputeTimer = window.state.rain._disputeTimer;
          window.state.rain._disputeTimer = market.expirationTimestamp + 7200;
          
          const txs = await window.state.rain.buildCreateMarketTx({
            marketQuestion: market.title,
            marketOptions: market.options,
            marketTags: ['auto'],
            marketDescription: market.description,
            isPublic: false,
            isPublicPoolResolverAi: false,
            creator: window.state.userAddress,
            startTime: BigInt(market.fireAt),
            endTime: BigInt(market.expirationTimestamp),
            no_of_options: BigInt(market.options.length),
            inputAmountWei,
            barValues: market.probabilities,
            baseToken: USDT_ADDRESS,
            tokenDecimals: 6
          });
          
          window.state.rain._disputeTimer = originalDisputeTimer;
          
          allTxs.push(...txs);
        }
        
        renderMarketsTable();
        
        log(`Sending ${allTxs.length} transactions (will require ${allTxs.length} signatures)...`, 'warning');
        alert(`Ready to sign ${allTxs.length} transactions.\n\nThis will create ${approved.length} private markets.`);
        
        // Execute all transactions
        for (let i = 0; i < allTxs.length; i++) {
          const tx = allTxs[i];
          log(`Signing transaction ${i + 1}/${allTxs.length}...`, 'info');
          
          const gas = await window.state.publicClient.estimateGas({
            account: window.state.userAddress,
            to: tx.to,
            data: tx.data,
            value: tx.value || 0n
          });
          
          const hash = await window.state.walletClient.sendTransaction({
            ...tx,
            chain: arbitrum,
            gas: gas + (gas / 5n)
          });
          
          log(`TX ${i + 1} sent: ${hash.slice(0, 20)}...`, 'info');
          
          await window.state.publicClient.waitForTransactionReceipt({ hash });
          log(`TX ${i + 1} confirmed!`, 'success');
        }
        
        // Mark all as executed
        approved.forEach(m => {
          m.status = 'executed';
          m.executedAt = Date.now();
        });
        
        saveMarkets();
        renderMarketsTable();
        log(`All ${approved.length} markets created successfully!`, 'success');
        alert(`🎉 ${approved.length} markets created!`);
        
      } catch (error) {
        console.error('Launch error:', error);
        log('Launch failed: ' + error.message, 'error');
        
        // Mark as failed
        approved.forEach(m => {
          if (m.status === 'executing') {
            m.status = 'failed';
            m.errorMessage = error.message;
          }
        });
        
        saveMarkets();
        renderMarketsTable();
        alert('Error: ' + error.message);
      }
    };

    // Delete selected
    window.deleteSelected = () => {
      const ids = getSelectedIds();
      if (ids.length === 0) return alert('No markets selected');
      
      if (!confirm(`Delete ${ids.length} market(s)?`)) return;
      
      window.state.markets = window.state.markets.filter(m => !ids.includes(m.id));
      saveMarkets();
      renderMarketsTable();
      log(`Deleted ${ids.length} markets`, 'success');
    };

    // Retry failed
    window.retryFailed = () => {
      const failedCount = window.state.markets.filter(m => m.status === 'failed').length;
      if (failedCount === 0) return alert('No failed markets');
      
      window.state.markets.forEach(m => {
        if (m.status === 'failed') {
          m.status = 'approved';
          m.errorMessage = null;
        }
      });
      
      saveMarkets();
      renderMarketsTable();
      log(`Retrying ${failedCount} failed markets`, 'success');
    };

    // Retry single market
    window.retryMarket = (id) => {
      const market = window.state.markets.find(m => m.id === id);
      if (!market) return;
      
      market.status = 'approved';
      market.errorMessage = null;
      saveMarkets();
      renderMarketsTable();
      log(`Retrying: ${market.title}`, 'success');
    };

    // Load API key on startup
    window.addEventListener('DOMContentLoaded', () => {
      const savedKey = localStorage.getItem('gemini_key');
      if (savedKey) {
        document.getElementById('geminiKey').value = savedKey;
        window.saveGeminiKey();
      }
      
      window.state.markets = loadMarkets();
      renderMarketsTable();
    });
  </script>
</body>
</html>
